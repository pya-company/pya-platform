name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure npm auth (no setup-node .npmrc — bun ignores its interpolation)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          npm config set @pya-platform:registry=https://registry.npmjs.org
          npm whoami
      - run: bun install --frozen-lockfile
      # changesets/action either opens a Version Packages PR, or runs `publish`
      # when a previously-merged Version PR landed on main. First run on a
      # virgin repo with no PR yet: this is a no-op — author the first
      # changeset locally and push.
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
