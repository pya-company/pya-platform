name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Diagnose token + write ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "token length: ${#NPM_TOKEN}"
          echo "token starts with: ${NPM_TOKEN:0:5}..."
          {
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
            echo "@pya-platform:registry=https://registry.npmjs.org"
          } > "$HOME/.npmrc"
          echo "--- direct curl whoami ---"
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" -H "Authorization: Bearer $NPM_TOKEN" https://registry.npmjs.org/-/whoami
          echo "--- npm whoami (verbose) ---"
          npm whoami --loglevel=http 2>&1 | grep -E "http|HTTP|Authoriz" | head -10 || true
      - run: bun install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
