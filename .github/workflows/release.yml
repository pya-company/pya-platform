name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # setup-node's auto-generated .npmrc uses ${NODE_AUTH_TOKEN} interpolation
      # which `bun run`-spawned child processes do not resolve consistently.
      # Write a resolved-value ~/.npmrc instead — works for both npm and bun-spawned npm.
      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
            echo "@pya-platform:registry=https://registry.npmjs.org"
          } > "$HOME/.npmrc"
          npm whoami
      - run: bun install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
