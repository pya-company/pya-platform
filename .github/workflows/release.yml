name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Write ~/.npmrc with resolved token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
            echo "@pya-platform:registry=https://registry.npmjs.org"
          } > "$HOME/.npmrc"
          echo "--- ~/.npmrc (redacted) ---"
          sed 's/_authToken=npm_[A-Za-z0-9]*/_authToken=npm_***REDACTED***/' "$HOME/.npmrc"
          echo "--- npm whoami ---"
          npm whoami
      - run: bun install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
